name: Refresh Metagraph (per-UID neurons)

# Chain-direct per-UID metagraph via Bittensor SDK get_all_metagraphs_info (#1348,
# epic #1345) — FIRST-PARTY, public RPC, no API key. Powers
# /api/v1/subnets/{netuid}/metagraph, /neurons/{uid}, and /validators. Daily +
# manual. Taostats fallback (scripts/fetch-metagraph.mjs + TAOSTATS_API_KEY) is
# documented for manual recovery only — not scheduled here.
#
# Stage snapshot to R2; the Worker's scheduled handler loads it into D1 through
# its METAGRAPH_HEALTH_DB binding (loadStagedNeurons) — no API-token D1 permission.
on:
  schedule:
    - cron: "23 5 * * *" # daily 05:23 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-metagraph
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      # No `cache: npm` here on purpose: this workflow holds Cloudflare secrets, so
      # we don't consume a shared npm cache another workflow could poison.
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22.22.3

      - name: Setup uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Install
        run: npm ci

      # bittensor is PINNED to the same version sync-subnets uses — bump deliberately
      # after re-verifying neuron row parity against economics ground truth.
      - name: Fetch per-UID metagraph (Bittensor SDK, first-party)
        run: uv run --from bittensor==10.4.0 python scripts/fetch-native-subnets.py --neurons-only --neurons-out dist/metagraph-neurons.json --network finney

      - name: Sign staged neuron snapshot
        if: steps.gate.outputs.ready == 'true'
        run: node scripts/sign-staged-neurons.mjs dist/metagraph-neurons.json
        env:
          METAGRAPH_STAGING_SIGNING_KEY: ${{ secrets.METAGRAPH_STAGING_SIGNING_KEY }}

      # Stage the signed snapshot to R2 (the token's existing R2 permission),
      # then the Worker's scheduled handler authenticates and bounds it before
      # loading into D1 through its METAGRAPH_HEALTH_DB binding.
      - name: Stage neurons to R2 for the Worker to load into D1
        run: npx wrangler r2 object put metagraphed-artifacts/metagraph/neurons-pending.json --file=dist/metagraph-neurons.json --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify on failure
        if: failure() && env.METAGRAPH_ALERT_WEBHOOK_URL != ''
        env:
          METAGRAPH_ALERT_WEBHOOK_URL: ${{ secrets.METAGRAPH_ALERT_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST "$METAGRAPH_ALERT_WEBHOOK_URL" \
            -H 'content-type: application/json' \
            -d '{"content":"🔴 metagraphed refresh-metagraph FAILED — the per-UID neurons D1 tier may go stale."}' || true
